name: Android Release

# Publishes an installable APK as a GitHub Release whenever a version tag is
# pushed (e.g. v1.1). The debug APK is debug-signed, so it installs directly by
# sideloading — download it on your phone from the release page.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app-manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp app/build/outputs/apk/debug/app-debug.apk \
             "$GITHUB_WORKSPACE/dist/app-manager-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: App Manager ${{ github.ref_name }}
          files: dist/app-manager-${{ github.ref_name }}.apk
          body: |
            Android App Manager ${{ github.ref_name }}.

            **Install on your phone:** download the `.apk` below, then open it.
            You may need to allow "Install unknown apps" for your browser.

            This build is debug-signed for easy sideloading (not a Play Store release).
