name: Android Release

# Publishes an installable APK as a GitHub Release. Triggers either on a pushed
# version tag (e.g. v1.1) or via manual dispatch with a version input — the
# release action creates the tag from the checked-out commit when dispatched.
# The debug APK is debug-signed, so it installs directly by sideloading.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v1.1)"
        required: true
        default: "v1.1"

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app-manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp app/build/outputs/apk/debug/app-debug.apk \
             "$GITHUB_WORKSPACE/dist/app-manager-${VERSION}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: BEZ App Manager ${{ env.VERSION }}
          files: dist/app-manager-${{ env.VERSION }}.apk
          body: |
            BEZ App Manager ${{ env.VERSION }}.

            **Install on your phone:** download the `.apk` below, then open it.
            You may need to allow "Install unknown apps" for your browser.

            This build is debug-signed for easy sideloading (not a Play Store release).
